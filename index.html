<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>可爱动物消消乐</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
        }

        .game-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .game-title {
            font-size: 28px;
            color: #4a4a4a;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .game-stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat-item {
            background: linear-gradient(135deg, #ff6b6b, #ffd93d);
            border-radius: 15px;
            padding: 10px;
            text-align: center;
            color: white;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .stat-value {
            font-size: 18px;
            display: block;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.9;
        }

        .level-progress {
            width: 100%;
            height: 10px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #4ecdc4, #44a08d);
            width: 0%;
            transition: width 0.3s ease;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 3px;
            background: #333;
            border-radius: 10px;
            padding: 5px;
            margin-bottom: 20px;
        }

        .cell {
            aspect-ratio: 1;
            background: white;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .cell:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .cell.selected {
            background: #ffeb3b;
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(255, 235, 59, 0.8);
        }

        .cell.matching {
            animation: pulse 0.5s ease-in-out;
        }

        .cell.falling {
            animation: fall 0.5s ease-in;
        }

        .animal {
            font-size: 24px;
            transition: all 0.3s ease;
        }

        .cell:hover .animal {
            transform: scale(1.2) rotate(10deg);
        }

        .special-block {
            position: relative;
        }

        .special-block::after {
            content: '✨';
            position: absolute;
            top: 2px;
            right: 2px;
            font-size: 10px;
        }

        .bomb-block::after {
            content: '💥';
        }

        .rainbow-block {
            background: linear-gradient(45deg, #ff6b6b, #ffd93d, #4ecdc4, #45b7d1, #96ceb4, #ffeaa7);
            background-size: 300% 300%;
            animation: rainbow 2s ease-in-out infinite;
        }

        .game-controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .btn-success {
            background: linear-gradient(135deg, #56ab2f, #a8e6cf);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
        }

        .modal-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .modal-title {
            font-size: 24px;
            margin-bottom: 15px;
            color: #333;
        }

        .modal-text {
            font-size: 16px;
            margin-bottom: 20px;
            color: #666;
            line-height: 1.5;
        }

        .combo-indicator {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 193, 7, 0.9);
            color: white;
            padding: 5px 10px;
            border-radius: 15px;
            font-weight: bold;
            transform: scale(0);
            transition: all 0.3s ease;
        }

        .combo-indicator.show {
            transform: scale(1);
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); background-color: #ffeb3b; }
            100% { transform: scale(1); }
        }

        @keyframes fall {
            0% { transform: translateY(-50px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        @keyframes rainbow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }

        .power-ups {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 15px;
        }

        .power-up {
            background: linear-gradient(135deg, #8360c3, #2ebf91);
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .power-up:hover {
            transform: scale(1.1);
        }

        .power-up.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .power-up-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ff4757;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @media (max-width: 480px) {
            .game-container {
                padding: 15px;
            }
            
            .game-title {
                font-size: 24px;
            }
            
            .animal {
                font-size: 20px;
            }
            
            .btn {
                padding: 10px 20px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <h1 class="game-title">🐾 动物消消乐 🐾</h1>
        </div>

        <div class="game-stats">
            <div class="stat-item">
                <span class="stat-value" id="score">0</span>
                <span class="stat-label">得分</span>
            </div>
            <div class="stat-item">
                <span class="stat-value" id="level">1</span>
                <span class="stat-label">关卡</span>
            </div>
            <div class="stat-item">
                <span class="stat-value" id="moves">30</span>
                <span class="stat-label">步数</span>
            </div>
        </div>

        <div class="level-progress">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <div class="power-ups">
            <button class="power-up" id="bombPowerUp" title="炸弹 - 消除周围3x3区域">
                💣
                <span class="power-up-count" id="bombCount">3</span>
            </button>
            <button class="power-up" id="rainbowPowerUp" title="彩虹球 - 消除所有同色方块">
                🌈
                <span class="power-up-count" id="rainbowCount">2</span>
            </button>
            <button class="power-up" id="shufflePowerUp" title="重新排列">
                🔀
                <span class="power-up-count" id="shuffleCount">2</span>
            </button>
        </div>

        <div class="game-board" id="gameBoard"></div>

        <div class="combo-indicator" id="comboIndicator">
            COMBO x<span id="comboCount">0</span>
        </div>

        <div class="game-controls">
            <button class="btn btn-primary" onclick="startGame()">开始游戏</button>
            <button class="btn btn-success" onclick="pauseGame()">暂停</button>
            <button class="btn btn-danger" onclick="resetGame()">重置</button>
        </div>
    </div>

    <!-- 游戏结束模态框 -->
    <div class="modal" id="gameModal">
        <div class="modal-content">
            <h2 class="modal-title" id="modalTitle">游戏结束</h2>
            <p class="modal-text" id="modalText">恭喜通关！</p>
            <div style="margin-top: 20px;">
                <button class="btn btn-primary" onclick="nextLevel()">下一关</button>
                <button class="btn btn-success" onclick="restartGame()">重新开始</button>
            </div>
        </div>
    </div>

    <script>
        class AnimalMatch3Game {
            constructor() {
                this.board = [];
                this.selectedCell = null;
                this.score = 0;
                this.level = 1;
                this.moves = 30;
                this.targetScore = 1000;
                this.combo = 0;
                this.gameActive = true;
                this.isPaused = false;
                this.animals = ['🐱', '🐶', '🐰', '🐼', '🐨', '🦊', '🐸', '🐷'];
                this.powerUps = {
                    bomb: 3,
                    rainbow: 2,
                    shuffle: 2
                };
                this.activePowerUp = null;
                
                this.initGame();
                this.bindEvents();
            }

            initGame() {
                this.createBoard();
                this.updateDisplay();
                this.removeInitialMatches();
            }

            createBoard() {
                const boardElement = document.getElementById('gameBoard');
                boardElement.innerHTML = '';
                this.board = [];

                for (let row = 0; row < 8; row++) {
                    this.board[row] = [];
                    for (let col = 0; col < 8; col++) {
                        const cell = document.createElement('div');
                        cell.className = 'cell';
                        cell.dataset.row = row;
                        cell.dataset.col = col;

                        const animal = this.getRandomAnimal();
                        this.board[row][col] = {
                            animal: animal,
                            element: cell,
                            special: false
                        };

                        const animalSpan = document.createElement('span');
                        animalSpan.className = 'animal';
                        animalSpan.textContent = animal;
                        cell.appendChild(animalSpan);

                        boardElement.appendChild(cell);
                    }
                }
            }

            getRandomAnimal() {
                const availableAnimals = this.animals.slice(0, Math.min(6 + Math.floor(this.level / 3), this.animals.length));
                return availableAnimals[Math.floor(Math.random() * availableAnimals.length)];
            }

            removeInitialMatches() {
                let hasMatches = true;
                while (hasMatches) {
                    const matches = this.findMatches();
                    if (matches.length === 0) {
                        hasMatches = false;
                    } else {
                        matches.forEach(match => {
                            const row = match.row;
                            const col = match.col;
                            this.board[row][col].animal = this.getRandomAnimal();
                            this.board[row][col].element.querySelector('.animal').textContent = this.board[row][col].animal;
                        });
                    }
                }
            }

            bindEvents() {
                document.getElementById('gameBoard').addEventListener('click', (e) => {
                    if (!this.gameActive || this.isPaused) return;
                    
                    const cell = e.target.closest('.cell');
                    if (!cell) return;

                    const row = parseInt(cell.dataset.row);
                    const col = parseInt(cell.dataset.col);

                    if (this.activePowerUp) {
                        this.usePowerUp(row, col);
                        return;
                    }

                    this.handleCellClick(row, col);
                });

                // 道具按钮事件
                document.getElementById('bombPowerUp').addEventListener('click', () => {
                    if (this.powerUps.bomb > 0) {
                        this.activePowerUp = 'bomb';
                        this.highlightPowerUpMode();
                    }
                });

                document.getElementById('rainbowPowerUp').addEventListener('click', () => {
                    if (this.powerUps.rainbow > 0) {
                        this.activePowerUp = 'rainbow';
                        this.highlightPowerUpMode();
                    }
                });

                document.getElementById('shufflePowerUp').addEventListener('click', () => {
                    if (this.powerUps.shuffle > 0) {
                        this.shuffleBoard();
                        this.powerUps.shuffle--;
                        this.updatePowerUpDisplay();
                    }
                });
            }

            highlightPowerUpMode() {
                document.getElementById('gameBoard').style.cursor = 'crosshair';
                document.getElementById('gameBoard').style.border = '3px solid #ff6b6b';
            }

            resetPowerUpMode() {
                document.getElementById('gameBoard').style.cursor = 'default';
                document.getElementById('gameBoard').style.border = 'none';
                this.activePowerUp = null;
            }

            usePowerUp(row, col) {
                switch (this.activePowerUp) {
                    case 'bomb':
                        this.useBomb(row, col);
                        this.powerUps.bomb--;
                        break;
                    case 'rainbow':
                        this.useRainbow(row, col);
                        this.powerUps.rainbow--;
                        break;
                }
                this.updatePowerUpDisplay();
                this.resetPowerUpMode();
                this.moves--;
                this.checkGameState();
            }

            useBomb(row, col) {
                const cellsToDestroy = [];
                for (let i = -1; i <= 1; i++) {
                    for (let j = -1; j <= 1; j++) {
                        const newRow = row + i;
                        const newCol = col + j;
                        if (newRow >= 0 && newRow < 8 && newCol >= 0 && newCol < 8) {
                            cellsToDestroy.push({ row: newRow, col: newCol });
                        }
                    }
                }
                
                this.destroyCells(cellsToDestroy);
                this.score += cellsToDestroy.length * 20;
            }

            useRainbow(row, col) {
                const targetAnimal = this.board[row][col].animal;
                const cellsToDestroy = [];
                
                for (let i = 0; i < 8; i++) {
                    for (let j = 0; j < 8; j++) {
                        if (this.board[i][j].animal === targetAnimal) {
                            cellsToDestroy.push({ row: i, col: j });
                        }
                    }
                }
                
                this.destroyCells(cellsToDestroy);
                this.score += cellsToDestroy.length * 15;
            }

            shuffleBoard() {
                const animals = [];
                for (let row = 0; row < 8; row++) {
                    for (let col = 0; col < 8; col++) {
                        animals.push(this.board[row][col].animal);
                    }
                }

                // Fisher-Yates 洗牌算法
                for (let i = animals.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [animals[i], animals[j]] = [animals[j], animals[i]];
                }

                let index = 0;
                for (let row = 0; row < 8; row++) {
                    for (let col = 0; col < 8; col++) {
                        this.board[row][col].animal = animals[index];
                        this.board[row][col].element.querySelector('.animal').textContent = animals[index];
                        index++;
                    }
                }

                this.removeInitialMatches();
            }

            handleCellClick(row, col) {
                if (!this.selectedCell) {
                    this.selectCell(row, col);
                } else {
                    const selectedRow = this.selectedCell.row;
                    const selectedCol = this.selectedCell.col;

                    if (row === selectedRow && col === selectedCol) {
                        this.deselectCell();
                        return;
                    }

                    if (this.isAdjacent(selectedRow, selectedCol, row, col)) {
                        this.swapCells(selectedRow, selectedCol, row, col);
                        this.deselectCell();
                    } else {
                        this.deselectCell();
                        this.selectCell(row, col);
                    }
                }
            }

            selectCell(row, col) {
                this.selectedCell = { row, col };
                this.board[row][col].element.classList.add('selected');
            }

            deselectCell() {
                if (this.selectedCell) {
                    this.board[this.selectedCell.row][this.selectedCell.col].element.classList.remove('selected');
                    this.selectedCell = null;
                }
            }

            isAdjacent(row1, col1, row2, col2) {
                const rowDiff = Math.abs(row1 - row2);
                const colDiff = Math.abs(col1 - col2);
                return (rowDiff === 1 && colDiff === 0) || (rowDiff === 0 && colDiff === 1);
            }

            async swapCells(row1, col1, row2, col2) {
                // 交换动物
                const temp = this.board[row1][col1].animal;
                this.board[row1][col1].animal = this.board[row2][col2].animal;
                this.board[row2][col2].animal = temp;

                // 更新显示
                this.board[row1][col1].element.querySelector('.animal').textContent = this.board[row1][col1].animal;
                this.board[row2][col2].element.querySelector('.animal').textContent = this.board[row2][col2].animal;

                // 检查是否形成匹配
                const matches = this.findMatches();
                if (matches.length > 0) {
                    this.moves--;
                    await this.processMatches();
                    this.checkGameState();
                } else {
                    // 没有匹配，撤销交换
                    setTimeout(() => {
                        const temp = this.board[row1][col1].animal;
                        this.board[row1][col1].animal = this.board[row2][col2].animal;
                        this.board[row2][col2].animal = temp;

                        this.board[row1][col1].element.querySelector('.animal').textContent = this.board[row1][col1].animal;
                        this.board[row2][col2].element.querySelector('.animal').textContent = this.board[row2][col2].animal;
                    }, 300);
                }

                this.updateDisplay();
            }

            findMatches() {
                const matches = [];
                const visited = new Set();

                // 检查水平匹配
                for (let row = 0; row < 8; row++) {
                    let count = 1;
                    let currentAnimal = this.board[row][0].animal;
                    
                    for (let col = 1; col < 8; col++) {
                        if (this.board[row][col].animal === currentAnimal) {
                            count++;
                        } else {
                            if (count >= 3) {
                                for (let i = col - count; i < col; i++) {
                                    const key = `${row},${i}`;
                                    if (!visited.has(key)) {
                                        matches.push({ row, col: i });
                                        visited.add(key);
                                    }
                                }
                            }
                            currentAnimal = this.board[row][col].animal;
                            count = 1;
                        }
                    }
                    
                    if (count >= 3) {
                        for (let i = 8 - count; i < 8; i++) {
                            const key = `${row},${i}`;
                            if (!visited.has(key)) {
                                matches.push({ row, col: i });
                                visited.add(key);
                            }
                        }
                    }
                }

                // 检查垂直匹配
                for (let col = 0; col < 8; col++) {
                    let count = 1;
                    let currentAnimal = this.board[0][col].animal;
                    
                    for (let row = 1; row < 8; row++) {
                        if (this.board[row][col].animal === currentAnimal) {
                            count++;
                        } else {
                            if (count >= 3) {
                                for (let i = row - count; i < row; i++) {
                                    const key = `${i},${col}`;
                                    if (!visited.has(key)) {
                                        matches.push({ row: i, col });
                                        visited.add(key);
                                    }
                                }
                            }
                            currentAnimal = this.board[row][col].animal;
                            count = 1;
                        }
                    }
                    
                    if (count >= 3) {
                        for (let i = 8 - count; i < 8; i++) {
                            const key = `${i},${col}`;
                            if (!visited.has(key)) {
                                matches.push({ row: i, col });
                                visited.add(key);
                            }
                        }
                    }
                }

                return matches;
            }

            async processMatches() {
                let hasMatches = true;
                this.combo = 0;

                while (hasMatches) {
                    const matches = this.findMatches();
                    if (matches.length === 0) {
                        hasMatches = false;
                    } else {
                        this.combo++;
                        this.showCombo();
                        
                        // 创建特殊方块
                        this.createSpecialBlocks(matches);
                        
                        // 计算得分
                        const baseScore = matches.length * 10;
                        const comboScore = baseScore * this.combo;
                        this.score += comboScore;

                        // 高亮匹配的方块
                        matches.forEach(match => {
                            this.board[match.row][match.col].element.classList.add('matching');
                        });

                        await this.delay(500);

                        // 移除匹配的方块
                        this.destroyCells(matches);

                        // 掉落新方块
                        await this.dropNewBlocks();
                        
                        this.updateDisplay();
                        await this.delay(300);
                    }
                }

                if (this.combo > 1) {
                    setTimeout(() => this.hideCombo(), 1500);
                }
            }

            createSpecialBlocks(matches) {
                if (matches.length >= 5) {
                    // 创建彩虹球
                    const firstMatch = matches[0];
                    this.board[firstMatch.row][firstMatch.col].special = 'rainbow';
                    this.board[firstMatch.row][firstMatch.col].element.classList.add('rainbow-block');
                } else if (matches.length >= 4) {
                    // 创建炸弹
                    const firstMatch = matches[0];
                    this.board[firstMatch.row][firstMatch.col].special = 'bomb';
                    this.board[firstMatch.row][firstMatch.col].element.classList.add('bomb-block');
                }
            }

            destroyCells(cells) {
                cells.forEach(cell => {
                    this.board[cell.row][cell.col].animal = null;
                    this.board[cell.row][cell.col].element.classList.remove('matching', 'special-block', 'bomb-block', 'rainbow-block');
                    this.board[cell.row][cell.col].element.querySelector('.animal').textContent = '';
                    this.board[cell.row][cell.col].special = false;
                });
            }

            async dropNewBlocks() {
                // 让现有方块下落
                for (let col = 0; col < 8; col++) {
                    let writePos = 7;
                    for (let readPos = 7; readPos >= 0; readPos--) {
                        if (this.board[readPos][col].animal !== null) {
                            if (writePos !== readPos) {
                                this.board[writePos][col].animal = this.board[readPos][col].animal;
                                this.board[writePos][col].element.querySelector('.animal').textContent = this.board[readPos][col].animal;
                                this.board[writePos][col].element.classList.add('falling');
                                
                                this.board[readPos][col].animal = null;
                                this.board[readPos][col].element.querySelector('.animal').textContent = '';
                            }
                            writePos--;
                        }
                    }

                    // 填充新方块
                    for (let row = writePos; row >= 0; row--) {
                        this.board[row][col].animal = this.getRandomAnimal();
                        this.board[row][col].element.querySelector('.animal').textContent = this.board[row][col].animal;
                        this.board[row][col].element.classList.add('falling');
                    }
                }

                await this.delay(500);
                
                // 移除下落动画
                for (let row = 0; row < 8; row++) {
                    for (let col = 0; col < 8; col++) {
                        this.board[row][col].element.classList.remove('falling');
                    }
                }
            }

            showCombo() {
                const comboIndicator = document.getElementById('comboIndicator');
                const comboCount = document.getElementById('comboCount');
                comboCount.textContent = this.combo;
                comboIndicator.classList.add('show');
            }

            hideCombo() {
                const comboIndicator = document.getElementById('comboIndicator');
                comboIndicator.classList.remove('show');
            }

            checkGameState() {
                this.updateDisplay();

                if (this.score >= this.targetScore) {
                    this.gameWin();
                } else if (this.moves <= 0) {
                    this.gameOver();
                }
            }

            gameWin() {
                this.gameActive = false;
                document.getElementById('modalTitle').textContent = '🎉 恭喜过关！';
                document.getElementById('modalText').innerHTML = `
                    <p>第 ${this.level} 关完成！</p>
                    <p>得分: ${this.score}</p>
                    <p>剩余步数: ${this.moves}</p>
                    <p>获得奖励道具！</p>
                `;
                document.getElementById('gameModal').style.display = 'block';

                // 奖励道具
                this.powerUps.bomb += 1;
                this.powerUps.rainbow += 1;
                if (this.level % 3 === 0) {
                    this.powerUps.shuffle += 1;
                }
            }

            gameOver() {
                this.gameActive = false;
                document.getElementById('modalTitle').textContent = '😢 游戏结束';
                document.getElementById('modalText').innerHTML = `
                    <p>步数用完了！</p>
                    <p>最终得分: ${this.score}</p>
                    <p>目标分数: ${this.targetScore}</p>
                    <p>差一点就成功了，再试一次吧！</p>
                `;
                document.getElementById('gameModal').style.display = 'block';
            }

            updateDisplay() {
                document.getElementById('score').textContent = this.score;
                document.getElementById('level').textContent = this.level;
                document.getElementById('moves').textContent = this.moves;
                
                const progress = Math.min((this.score / this.targetScore) * 100, 100);
                document.getElementById('progressBar').style.width = progress + '%';

                this.updatePowerUpDisplay();
            }

            updatePowerUpDisplay() {
                document.getElementById('bombCount').textContent = this.powerUps.bomb;
                document.getElementById('rainbowCount').textContent = this.powerUps.rainbow;
                document.getElementById('shuffleCount').textContent = this.powerUps.shuffle;

                document.getElementById('bombPowerUp').classList.toggle('disabled', this.powerUps.bomb <= 0);
                document.getElementById('rainbowPowerUp').classList.toggle('disabled', this.powerUps.rainbow <= 0);
                document.getElementById('shufflePowerUp').classList.toggle('disabled', this.powerUps.shuffle <= 0);
            }

            nextLevel() {
                this.level++;
                this.moves = Math.max(25, 30 - this.level); // 随着关卡增加，步数略微减少
                this.targetScore = this.targetScore + (this.level * 500); // 目标分数递增
                this.combo = 0;
                this.gameActive = true;
                this.updatePowerUpDisplay();
                
                document.getElementById('gameModal').style.display = 'none';
                this.createBoard();
                this.removeInitialMatches();
                this.updateDisplay();
            }

            delay(ms) {
                return new Promise(resolve => setTimeout(resolve, ms));
            }
        }

        let game;

        function startGame() {
            game = new AnimalMatch3Game();
        }

        function pauseGame() {
            if (game) {
                game.isPaused = !game.isPaused;
                const btn = event.target;
                btn.textContent = game.isPaused ? '继续' : '暂停';
            }
        }

        function resetGame() {
            if (game) {
                game.score = 0;
                game.level = 1;
                game.moves = 30;
                game.targetScore = 1000;
                game.powerUps = { bomb: 3, rainbow: 2, shuffle: 2 };
                game.gameActive = true;
                game.isPaused = false;
                game.createBoard();
                game.removeInitialMatches();
                game.updateDisplay();
                document.getElementById('gameModal').style.display = 'none';
            }
        }

        function restartGame() {
            document.getElementById('gameModal').style.display = 'none';
            resetGame();
        }

        function nextLevel() {
            if (game) {
                game.nextLevel();
            }
        }

        // 页面加载完成后自动开始游戏
        window.addEventListener('load', () => {
            startGame();
        });
    </script>
</body>
</html>
