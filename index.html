<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>动物消消乐 - 羊了个羊风格</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            overflow-x: hidden;
        }

        .game-header {
            text-align: center;
            color: white;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.37);
            width: 100%;
            max-width: 600px;
        }

        .level-indicator {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #FFD700;
        }

        .game-stats {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 10px;
        }

        .stat {
            text-align: center;
            padding: 5px 10px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            min-width: 80px;
        }

        .stat-value {
            font-size: 18px;
            font-weight: bold;
            color: #FFD700;
        }

        .tools {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 15px 0;
            flex-wrap: wrap;
        }

        .tool-btn {
            padding: 10px 15px;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            position: relative;
            transition: all 0.3s ease;
            min-width: 80px;
        }

        .tool-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .tool-btn.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .tool-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #ff4757;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .shuffle-btn { background: linear-gradient(45deg, #ff6b6b, #ee5a24); color: white; }
        .hint-btn { background: linear-gradient(45deg, #4834d4, #686de0); color: white; }
        .bomb-btn { background: linear-gradient(45deg, #ff9ff3, #f368e0); color: white; }

        .game-container {
            position: relative;
            margin: 20px 0;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 3px;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.37);
            max-width: 400px;
        }

        .cell {
            width: 45px;
            height: 45px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            background: rgba(255, 255, 255, 0.9);
            user-select: none;
        }

        .cell:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .cell.selected {
            border: 3px solid #FFD700;
            box-shadow: 0 0 20px #FFD700;
        }

        .cell.matching {
            animation: pulse 0.5s ease-in-out;
        }

        .cell.special-bomb {
            background: linear-gradient(45deg, #ff6b6b, #ee5a24, #ff6b6b);
            background-size: 200% 200%;
            animation: specialGlow 2s ease-in-out infinite;
            border: 2px solid #FFD700;
        }

        .cell.row-bomb {
            background: linear-gradient(90deg, #4834d4, #686de0, #4834d4);
            background-size: 200% 200%;
            animation: specialGlow 2s ease-in-out infinite;
        }

        .cell.col-bomb {
            background: linear-gradient(0deg, #20bf6b, #26d0ce, #20bf6b);
            background-size: 200% 200%;
            animation: specialGlow 2s ease-in-out infinite;
        }

        @keyframes specialGlow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        @keyframes fadeOut {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(0.5); }
        }

        @keyframes dropIn {
            0% { transform: translateY(-50px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .cell.removing {
            animation: fadeOut 0.5s ease-in-out forwards;
        }

        .cell.dropping {
            animation: dropIn 0.5s ease-out;
        }

        .explosion {
            position: absolute;
            pointer-events: none;
            z-index: 1000;
        }

        .explosion-particle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #ff6b6b;
            border-radius: 50%;
            animation: explode 0.8s ease-out forwards;
        }

        @keyframes explode {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            100% {
                transform: scale(3) translate(var(--dx, 0), var(--dy, 0));
                opacity: 0;
            }
        }

        .level-complete, .level-failed {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal {
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            max-width: 350px;
            margin: 20px;
            animation: modalPop 0.5s ease-out;
        }

        @keyframes modalPop {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .modal h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .modal button {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            margin: 5px;
            transition: transform 0.3s ease;
        }

        .modal button:hover {
            transform: translateY(-2px);
        }

        .progress-bar {
            width: 100%;
            height: 20px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(45deg, #20bf6b, #26d0ce);
            transition: width 0.5s ease;
            border-radius: 10px;
        }

        @media (max-width: 500px) {
            .cell {
                width: 38px;
                height: 38px;
                font-size: 20px;
            }
            
            .game-board {
                gap: 2px;
                padding: 8px;
            }
        }

        .score-popup {
            position: absolute;
            color: #FFD700;
            font-weight: bold;
            font-size: 18px;
            pointer-events: none;
            animation: scoreFloat 1s ease-out forwards;
            z-index: 1000;
        }

        @keyframes scoreFloat {
            0% {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translateY(-50px) scale(1.5);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="game-header">
        <div class="level-indicator">第 <span id="currentLevel">1</span> 关</div>
        <div class="game-stats">
            <div class="stat">
                <div>得分</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div>目标</div>
                <div class="stat-value" id="target">1000</div>
            </div>
            <div class="stat">
                <div>移动</div>
                <div class="stat-value" id="moves">30</div>
            </div>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="progressBar"></div>
        </div>
    </div>

    <div class="tools">
        <button class="tool-btn shuffle-btn" onclick="useTool('shuffle')">
            重排 <span class="tool-count" id="shuffleCount">1</span>
        </button>
        <button class="tool-btn hint-btn" onclick="useTool('hint')">
            提示 <span class="tool-count" id="hintCount">1</span>
        </button>
        <button class="tool-btn bomb-btn" onclick="useTool('bomb')">
            炸弹 <span class="tool-count" id="bombCount">1</span>
        </button>
    </div>

    <div class="game-container">
        <div class="game-board" id="gameBoard"></div>
    </div>

    <script>
        class AnimalMatch3 {
            constructor() {
                this.BOARD_SIZE = 8;
                this.ANIMALS = ['🐱', '🐶', '🐭', '🐹', '🐰', '🦊', '🐻', '🐼'];
                this.board = [];
                this.selectedCell = null;
                this.score = 0;
                this.moves = 30;
                this.target = 1000;
                this.level = 1;
                this.tools = {
                    shuffle: 1,
                    hint: 1,
                    bomb: 1
                };
                this.isProcessing = false;
                this.activeTool = null;
                
                this.init();
            }

            init() {
                this.createBoard();
                this.renderBoard();
                this.updateUI();
            }

            createBoard() {
                this.board = [];
                for (let row = 0; row < this.BOARD_SIZE; row++) {
                    this.board[row] = [];
                    for (let col = 0; col < this.BOARD_SIZE; col++) {
                        if (this.level === 1) {
                            // 第一关：简单模式，只用4种动物，更容易匹配
                            this.board[row][col] = {
                                animal: this.ANIMALS[Math.floor(Math.random() * 4)],
                                special: null
                            };
                        } else {
                            // 第二关：困难模式，使用更多动物类型，减少匹配机会
                            this.board[row][col] = {
                                animal: this.ANIMALS[Math.floor(Math.random() * (this.level === 2 ? 7 : 6))],
                                special: null
                            };
                        }
                    }
                }
                
                // 确保初始状态没有现成的匹配
                this.removeInitialMatches();
            }

            removeInitialMatches() {
                let hasMatches = true;
                while (hasMatches) {
                    hasMatches = false;
                    for (let row = 0; row < this.BOARD_SIZE; row++) {
                        for (let col = 0; col < this.BOARD_SIZE; col++) {
                            if (this.checkMatchAt(row, col).length >= 3) {
                                this.board[row][col].animal = this.getRandomAnimal();
                                hasMatches = true;
                            }
                        }
                    }
                }
            }

            getRandomAnimal() {
                if (this.level === 1) {
                    return this.ANIMALS[Math.floor(Math.random() * 4)];
                } else {
                    return this.ANIMALS[Math.floor(Math.random() * 7)];
                }
            }

            renderBoard() {
                const boardElement = document.getElementById('gameBoard');
                boardElement.innerHTML = '';
                
                for (let row = 0; row < this.BOARD_SIZE; row++) {
                    for (let col = 0; col < this.BOARD_SIZE; col++) {
                        const cell = document.createElement('div');
                        cell.className = 'cell';
                        cell.dataset.row = row;
                        cell.dataset.col = col;
                        
                        const cellData = this.board[row][col];
                        cell.textContent = cellData.animal;
                        
                        if (cellData.special) {
                            cell.classList.add(cellData.special);
                        }
                        
                        cell.addEventListener('click', () => this.handleCellClick(row, col));
                        boardElement.appendChild(cell);
                    }
                }
            }

            handleCellClick(row, col) {
                if (this.isProcessing) return;
                
                if (this.activeTool === 'bomb') {
                    this.useBomb(row, col);
                    this.activeTool = null;
                    return;
                }

                const clickedCell = document.querySelector(`[data-row="${row}"][data-col="${col}"]`);
                
                if (this.selectedCell === null) {
                    this.selectedCell = { row, col };
                    clickedCell.classList.add('selected');
                } else {
                    const prevSelected = document.querySelector('.selected');
                    if (prevSelected) prevSelected.classList.remove('selected');
                    
                    if (this.selectedCell.row === row && this.selectedCell.col === col) {
                        this.selectedCell = null;
                        return;
                    }
                    
                    if (this.isAdjacent(this.selectedCell.row, this.selectedCell.col, row, col)) {
                        this.swapCells(this.selectedCell.row, this.selectedCell.col, row, col);
                    }
                    
                    this.selectedCell = null;
                }
            }

            isAdjacent(row1, col1, row2, col2) {
                const rowDiff = Math.abs(row1 - row2);
                const colDiff = Math.abs(col1 - col2);
                return (rowDiff === 1 && colDiff === 0) || (rowDiff === 0 && colDiff === 1);
            }

            async swapCells(row1, col1, row2, col2) {
                // 交换
                const temp = { ...this.board[row1][col1] };
                this.board[row1][col1] = { ...this.board[row2][col2] };
                this.board[row2][col2] = temp;
                
                this.renderBoard();
                
                const matches1 = this.checkMatchAt(row1, col1);
                const matches2 = this.checkMatchAt(row2, col2);
                
                if (matches1.length >= 3 || matches2.length >= 3) {
                    this.moves--;
                    this.updateUI();
                    await this.processMatches();
                } else {
                    // 没有匹配，交换回去
                    const temp = { ...this.board[row1][col1] };
                    this.board[row1][col1] = { ...this.board[row2][col2] };
                    this.board[row2][col2] = temp;
                    this.renderBoard();
                }
            }

            checkMatchAt(row, col) {
                const animal = this.board[row][col].animal;
                const matches = [{ row, col }];
                
                // 检查水平匹配
                let left = col - 1;
                while (left >= 0 && this.board[row][left].animal === animal) {
                    matches.push({ row, col: left });
                    left--;
                }
                
                let right = col + 1;
                while (right < this.BOARD_SIZE && this.board[row][right].animal === animal) {
                    matches.push({ row, col: right });
                    right++;
                }
                
                if (matches.length >= 3) return matches;
                
                // 检查垂直匹配
                const verticalMatches = [{ row, col }];
                let up = row - 1;
                while (up >= 0 && this.board[up][col].animal === animal) {
                    verticalMatches.push({ row: up, col });
                    up--;
                }
                
                let down = row + 1;
                while (down < this.BOARD_SIZE && this.board[down][col].animal === animal) {
                    verticalMatches.push({ row: down, col });
                    down++;
                }
                
                return verticalMatches.length >= 3 ? verticalMatches : [];
            }

            async processMatches() {
                this.isProcessing = true;
                let totalMatches = 0;
                let hasMatches = true;
                
                while (hasMatches) {
                    hasMatches = false;
                    const allMatches = [];
                    
                    // 收集所有匹配
                    for (let row = 0; row < this.BOARD_SIZE; row++) {
                        for (let col = 0; col < this.BOARD_SIZE; col++) {
                            const matches = this.checkMatchAt(row, col);
                            if (matches.length >= 3) {
                                // 检查特殊消除类型
                                const specialType = this.getSpecialType(matches);
                                allMatches.push({ matches, special: specialType, originRow: row, originCol: col });
                            }
                        }
                    }
                    
                    if (allMatches.length > 0) {
                        hasMatches = true;
                        
                        // 处理每组匹配
                        for (const matchGroup of allMatches) {
                            const { matches, special, originRow, originCol } = matchGroup;
                            
                            // 创建爆炸效果
                            this.createExplosion(originRow, originCol);
                            
                            // 标记要移除的格子
                            matches.forEach(({ row, col }) => {
                                const cell = document.querySelector(`[data-row="${row}"][data-col="${col}"]`);
                                if (cell) cell.classList.add('matching');
                            });
                            
                            totalMatches += matches.length;
                            
                            // 创建特殊方块
                            if (special && matches.length > 0) {
                                const centerMatch = matches[Math.floor(matches.length / 2)];
                                this.board[centerMatch.row][centerMatch.col].special = special;
                            }
                        }
                        
                        await this.delay(500);
                        
                        // 移除匹配的方块
                        for (const matchGroup of allMatches) {
                            matchGroup.matches.forEach(({ row, col }) => {
                                this.board[row][col] = null;
                            });
                        }
                        
                        await this.dropPieces();
                        await this.fillBoard();
                    }
                }
                
                if (totalMatches > 0) {
                    const points = totalMatches * 10 * (this.level === 2 ? 2 : 1); // 第二关双倍分数
                    this.score += points;
                    this.showScorePopup(points);
                    this.updateUI();
                }
                
                this.isProcessing = false;
                this.checkGameState();
            }

            getSpecialType(matches) {
                if (matches.length >= 5) {
                    return 'special-bomb'; // 彩色炸弹
                } else if (matches.length === 4) {
                    // 判断是横向还是纵向
                    const isHorizontal = matches.every(m => m.row === matches[0].row);
                    return isHorizontal ? 'row-bomb' : 'col-bomb';
                }
                return null;
            }

            createExplosion(row, col) {
                const cell = document.querySelector(`[data-row="${row}"][data-col="${col}"]`);
                if (!cell) return;
                
                const rect = cell.getBoundingClientRect();
                const explosion = document.createElement('div');
                explosion.className = 'explosion';
                explosion.style.left = rect.left + rect.width / 2 + 'px';
                explosion.style.top = rect.top + rect.height / 2 + 'px';
                
                // 创建爆炸粒子
                for (let i = 0; i < 8; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'explosion-particle';
                    
                    const angle = (i / 8) * Math.PI * 2;
                    const distance = 50 + Math.random() * 30;
                    const dx = Math.cos(angle) * distance;
                    const dy = Math.sin(angle) * distance;
                    
                    particle.style.setProperty('--dx', dx + 'px');
                    particle.style.setProperty('--dy', dy + 'px');
                    particle.style.background = `hsl(${Math.random() * 60 + 10}, 100%, 60%)`;
                    
                    explosion.appendChild(particle);
                }
                
                document.body.appendChild(explosion);
                
                setTimeout(() => {
                    explosion.remove();
                }, 1000);
            }

            showScorePopup(points) {
                const popup = document.createElement('div');
                popup.className = 'score-popup';
                popup.textContent = `+${points}`;
                popup.style.left = Math.random() * 200 + 100 + 'px';
                popup.style.top = Math.random() * 100 + 200 + 'px';
                
                document.body.appendChild(popup);
                
                setTimeout(() => {
                    popup.remove();
                }, 1000);
            }

            async dropPieces() {
                for (let col = 0; col < this.BOARD_SIZE; col++) {
                    let writePos = this.BOARD_SIZE - 1;
                    
                    for (let row = this.BOARD_SIZE - 1; row >= 0; row--) {
                        if (this.board[row][col] !== null) {
                            if (writePos !== row) {
                                this.board[writePos][col] = this.board[row][col];
                                this.board[row][col] = null;
                            }
                            writePos--;
                        }
                    }
                }
                
                this.renderBoard();
                await this.delay(300);
            }

            async fillBoard() {
                for (let row = 0; row < this.BOARD_SIZE; row++) {
                    for (let col = 0; col < this.BOARD_SIZE; col++) {
                        if (this.board[row][col] === null) {
                            this.board[row][col] = {
                                animal: this.getRandomAnimal(),
                                special: null
                            };
                        }
                    }
                }
                
                this.renderBoard();
                
                // 添加掉落动画
                const newCells = document.querySelectorAll('.cell');
                newCells.forEach(cell => cell.classList.add('dropping'));
                
                await this.delay(300);
                
                newCells.forEach(cell => cell.classList.remove('dropping'));
            }

            useTool(toolType) {
                if (this.tools[toolType] <= 0 || this.isProcessing) return;
                
                switch (toolType) {
                    case 'shuffle':
                        this.shuffleBoard();
                        this.tools[toolType]--;
                        break;
                    case 'hint':
                        this.showHint();
                        this.tools[toolType]--;
                        break;
                    case 'bomb':
                        this.activeTool = 'bomb';
                        break;
                }
                
                this.updateUI();
            }

            shuffleBoard() {
                const animals = [];
                for (let row = 0; row < this.BOARD_SIZE; row++) {
                    for (let col = 0; col < this.BOARD_SIZE; col++) {
                        animals.push(this.board[row][col].animal);
                    }
                }
                
                // Fisher-Yates 洗牌算法
                for (let i = animals.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [animals[i], animals[j]] = [animals[j], animals[i]];
                }
                
                let index = 0;
                for (let row = 0; row < this.BOARD_SIZE; row++) {
                    for (let col = 0; col < this.BOARD_SIZE; col++) {
                        this.board[row][col].animal = animals[index++];
                        this.board[row][col].special = null;
                    }
                }
                
                this.renderBoard();
            }

            showHint() {
                // 简单的提示：高亮一个可能的移动
                for (let row = 0; row < this.BOARD_SIZE; row++) {
                    for (let col = 0; col < this.BOARD_SIZE - 1; col++) {
                        // 尝试水平交换
                        const temp = { ...this.board[row][col] };
                        this.board[row][col] = { ...this.board[row][col + 1] };
                        this.board[row][col + 1] = temp;
                        
                        if (this.checkMatchAt(row, col).length >= 3 || 
                            this.checkMatchAt(row, col + 1).length >= 3) {
                            // 恢复并高亮
                            const temp2 = { ...this.board[row][col] };
                            this.board[row][col] = { ...this.board[row][col + 1] };
                            this.board[row][col + 1] = temp2;
                            
                            const cell1 = document.querySelector(`[data-row="${row}"][data-col="${col}"]`);
                            const cell2 = document.querySelector(`[data-row="${row}"][data-col="${col + 1}"]`);
                            
                            cell1.style.backgroundColor = 'rgba(255, 215, 0, 0.5)';
                            cell2.style.backgroundColor = 'rgba(255, 215, 0, 0.5)';
                            
                            setTimeout(() => {
                                cell1.style.backgroundColor = '';
                                cell2.style.backgroundColor = '';
                            }, 2000);
                            
                            return;
                        } else {
                            // 恢复
                            const temp2 = { ...this.board[row][col] };
                            this.board[row][col] = { ...this.board[row][col + 1] };
                            this.board[row][col + 1] = temp2;
                        }
                    }
                }
            }

            useBomb(row, col) {
                if (this.tools.bomb <= 0) return;
                
                this.createExplosion(row, col);
                
                // 炸掉3x3区域
                for (let r = Math.max(0, row - 1); r <= Math.min(this.BOARD_SIZE - 1, row + 1); r++) {
                    for (let c = Math.max(0, col - 1); c <= Math.min(this.BOARD_SIZE - 1, col + 1); c++) {
                        this.board[r][c] = null;
                    }
                }
                
                this.tools.bomb--;
                this.score += 50;
                
                setTimeout(async () => {
                    await this.dropPieces();
                    await this.fillBoard();
                    await this.processMatches();
                }, 500);
                
                this.updateUI();
            }

            updateUI() {
                document.getElementById('score').textContent = this.score;
                document.getElementById('moves').textContent = this.moves;
                document.getElementById('target').textContent = this.target;
                document.getElementById('currentLevel').textContent = this.level;
                
                // 更新进度条
                const progress = Math.min(100, (this.score / this.target) * 100);
                document.getElementById('progressBar').style.width = progress + '%';
                
                // 更新道具计数
                document.getElementById('shuffleCount').textContent = this.tools.shuffle;
                document.getElementById('hintCount').textContent = this.tools.hint;
                document.getElementById('bombCount').textContent = this.tools.bomb;
                
                // 禁用没有的道具
                Object.keys(this.tools).forEach(tool => {
                    const btn = document.querySelector(`.${tool}-btn`);
                    if (this.tools[tool] <= 0) {
                        btn.classList.add('disabled');
                    } else {
                        btn.classList.remove('disabled');
                    }
                });
            }

            checkGameState() {
                if (this.score >= this.target) {
                    this.levelComplete();
                } else if (this.moves <= 0) {
                    this.gameOver();
                }
            }

            levelComplete() {
                const modal = document.createElement('div');
                modal.className = 'level-complete';
                modal.innerHTML = `
                    <div class="modal">
                        <h2>🎉 恭喜过关！</h2>
                        <p>得分：${this.score}</p>
                        <p>剩余移动：${this.moves}</p>
                        ${this.level === 1 ? 
                            '<button onclick="game.nextLevel()">进入第二关</button>' :
                            '<button onclick="game.restart()">重新开始</button>'
                        }
                        <button onclick="game.restart()">返回第一关</button>
                    </div>
                `;
                document.body.appendChild(modal);
            }

            gameOver() {
                const modal = document.createElement('div');
                modal.className = 'level-failed';
                modal.innerHTML = `
                    <div class="modal">
                        <h2>😢 挑战失败</h2>
                        <p>得分：${this.score}</p>
                        <p>目标：${this.target}</p>
                        <button onclick="game.restart()">重新开始</button>
                        ${this.level === 2 ? '<button onclick="game.backToLevel1()">返回第一关</button>' : ''}
                    </div>
                `;
                document.body.appendChild(modal);
            }

            nextLevel() {
                this.level = 2;
                this.target = 3000; // 第二关目标更高
                this.moves = 25; // 移动次数更少
                this.score = 0;
                // 重置道具
                this.tools = { shuffle: 1, hint: 1, bomb: 1 };
                
                document.querySelector('.level-complete')?.remove();
                this.createBoard();
                this.renderBoard();
                this.updateUI();
            }

            backToLevel1() {
                this.level = 1;
                this.restart();
            }

            restart() {
                this.level = this.level || 1;
                this.score = 0;
                this.moves = this.level === 1 ? 30 : 25;
                this.target = this.level === 1 ? 1000 : 3000;
                this.tools = { shuffle: 1, hint: 1, bomb: 1 };
                this.selectedCell = null;
                this.isProcessing = false;
                this.activeTool = null;
                
                document.querySelector('.level-complete')?.remove();
                document.querySelector('.level-failed')?.remove();
                
                this.createBoard();
                this.renderBoard();
                this.updateUI();
            }

            delay(ms) {
                return new Promise(resolve => setTimeout(resolve, ms));
            }
        }

        // 全局函数
        function useTool(toolType) {
            game.useTool(toolType);
        }

        // 初始化游戏
        const game = new AnimalMatch3();
    </script>
</body>
</html>
