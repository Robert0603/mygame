<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>萌宠消消乐</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 500px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.9);
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .score-info {
            text-align: left;
        }

        .level-info {
            text-align: center;
        }

        .tools {
            text-align: right;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(8, 50px);
            grid-template-rows: repeat(8, 50px);
            gap: 2px;
            background: rgba(255, 255, 255, 0.2);
            padding: 10px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .cell {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .cell:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .cell.selected {
            background: #ffd700;
            transform: scale(1.2);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
        }

        .cell.special-bomb {
            background: linear-gradient(45deg, #ff6b6b, #ee5a52);
            animation: pulse 1s infinite;
        }

        .cell.line-bomb {
            background: linear-gradient(45deg, #4ecdc4, #44a08d);
            animation: pulse 1s infinite;
        }

        .cell.color-bomb {
            background: linear-gradient(45deg, #a8edea, #fed6e3);
            animation: rainbow 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes rainbow {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        .explosion {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            background: radial-gradient(circle, #ff6b6b, #ffa500);
            border-radius: 50%;
            animation: explode 0.6s ease-out forwards;
            pointer-events: none;
            z-index: 100;
        }

        @keyframes explode {
            0% {
                transform: translate(-50%, -50%) scale(0);
                opacity: 1;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.5);
                opacity: 0.8;
            }
            100% {
                transform: translate(-50%, -50%) scale(2);
                opacity: 0;
            }
        }

        .tool-btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            margin: 0 5px;
            font-size: 12px;
            transition: background 0.3s;
        }

        .tool-btn:hover {
            background: #45a049;
        }

        .tool-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
        }

        .modal-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            max-width: 300px;
            width: 90%;
        }

        .btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px;
            font-size: 16px;
        }

        .btn:hover {
            background: #45a049;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #ddd;
            border-radius: 5px;
            margin: 10px 0;
        }

        .progress {
            height: 100%;
            background: #4CAF50;
            border-radius: 5px;
            transition: width 0.3s;
        }

        @media (max-width: 600px) {
            .game-board {
                grid-template-columns: repeat(8, 40px);
                grid-template-rows: repeat(8, 40px);
            }
            
            .cell {
                width: 40px;
                height: 40px;
                font-size: 24px;
            }
            
            .header {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="score-info">
            <div>得分: <span id="score">0</span></div>
            <div>目标: <span id="target">1000</span></div>
            <div class="progress-bar">
                <div class="progress" id="progress"></div>
            </div>
        </div>
        <div class="level-info">
            <h2 id="levelTitle">第1关</h2>
            <div>步数: <span id="moves">30</span></div>
        </div>
        <div class="tools">
            <button class="tool-btn" id="shuffleBtn" onclick="useShuffle()">
                🔄 重排(<span id="shuffleCount">1</span>)
            </button>
            <button class="tool-btn" id="bombBtn" onclick="useBomb()">
                💣 炸弹(<span id="bombCount">1</span>)
            </button>
        </div>
    </div>

    <div class="game-board" id="gameBoard"></div>

    <!-- 游戏结束模态框 -->
    <div class="modal" id="gameModal">
        <div class="modal-content">
            <h2 id="modalTitle">游戏结束</h2>
            <p id="modalMessage">恭喜通关！</p>
            <button class="btn" onclick="nextLevel()">下一关</button>
            <button class="btn" onclick="restartGame()">重新开始</button>
        </div>
    </div>

    <script>
        class CuteMatch3Game {
            constructor() {
                // 可爱的小动物表情
                this.animals = ['🐱', '🐶', '🐰', '🐼', '🐸', '🦊'];
                this.board = [];
                this.selectedCell = null;
                this.score = 0;
                this.level = 1;
                this.moves = 30;
                this.target = 1000;
                this.shuffleCount = 1;
                this.bombCount = 1;
                this.isProcessing = false;
                
                this.initGame();
                this.updateUI();
            }

            initGame() {
                this.board = [];
                const boardElement = document.getElementById('gameBoard');
                boardElement.innerHTML = '';

                // 初始化棋盘
                for (let row = 0; row < 8; row++) {
                    this.board[row] = [];
                    for (let col = 0; col < 8; col++) {
                        this.board[row][col] = this.getRandomAnimal();
                    }
                }

                // 确保初始状态没有匹配
                this.removeInitialMatches();
                this.renderBoard();
                this.updateUI();
            }

            getRandomAnimal() {
                return this.animals[Math.floor(Math.random() * this.animals.length)];
            }

            removeInitialMatches() {
                let hasMatches = true;
                while (hasMatches) {
                    hasMatches = false;
                    for (let row = 0; row < 8; row++) {
                        for (let col = 0; col < 8; col++) {
                            if (this.hasMatchAt(row, col)) {
                                this.board[row][col] = this.getRandomAnimal();
                                hasMatches = true;
                            }
                        }
                    }
                }
            }

            hasMatchAt(row, col) {
                const animal = this.board[row][col];
                
                // 检查横向匹配
                let horizontalCount = 1;
                for (let c = col - 1; c >= 0 && this.board[row][c] === animal; c--) horizontalCount++;
                for (let c = col + 1; c < 8 && this.board[row][c] === animal; c++) horizontalCount++;
                
                // 检查纵向匹配
                let verticalCount = 1;
                for (let r = row - 1; r >= 0 && this.board[r][col] === animal; r--) verticalCount++;
                for (let r = row + 1; r < 8 && this.board[r][col] === animal; r++) verticalCount++;
                
                return horizontalCount >= 3 || verticalCount >= 3;
            }

            renderBoard() {
                const boardElement = document.getElementById('gameBoard');
                boardElement.innerHTML = '';

                for (let row = 0; row < 8; row++) {
                    for (let col = 0; col < 8; col++) {
                        const cell = document.createElement('div');
                        cell.className = 'cell';
                        cell.dataset.row = row;
                        cell.dataset.col = col;
                        cell.textContent = this.board[row][col];
                        cell.onclick = () => this.handleCellClick(row, col);
                        
                        // 检查是否是特殊炸弹
                        if (this.board[row][col] === '💣') {
                            cell.classList.add('special-bomb');
                        } else if (this.board[row][col] === '⚡') {
                            cell.classList.add('line-bomb');
                        } else if (this.board[row][col] === '🌈') {
                            cell.classList.add('color-bomb');
                        }
                        
                        boardElement.appendChild(cell);
                    }
                }
            }

            handleCellClick(row, col) {
                if (this.isProcessing || this.moves <= 0) return;

                const cell = document.querySelector(`[data-row="${row}"][data-col="${col}"]`);
                
                if (this.selectedCell) {
                    if (this.selectedCell.row === row && this.selectedCell.col === col) {
                        // 取消选择
                        this.clearSelection();
                        return;
                    }
                    
                    if (this.isAdjacent(this.selectedCell.row, this.selectedCell.col, row, col)) {
                        // 交换方块
                        this.swapCells(this.selectedCell.row, this.selectedCell.col, row, col);
                        this.clearSelection();
                        this.moves--;
                        this.processMatches();
                        this.updateUI();
                    } else {
                        // 选择新的方块
                        this.clearSelection();
                        this.selectCell(row, col, cell);
                    }
                } else {
                    // 选择方块
                    this.selectCell(row, col, cell);
                }
            }

            selectCell(row, col, cell) {
                this.selectedCell = { row, col };
                cell.classList.add('selected');
            }

            clearSelection() {
                document.querySelectorAll('.cell.selected').forEach(cell => {
                    cell.classList.remove('selected');
                });
                this.selectedCell = null;
            }

            isAdjacent(row1, col1, row2, col2) {
                const rowDiff = Math.abs(row1 - row2);
                const colDiff = Math.abs(col1 - col2);
                return (rowDiff === 1 && colDiff === 0) || (rowDiff === 0 && colDiff === 1);
            }

            swapCells(row1, col1, row2, col2) {
                const temp = this.board[row1][col1];
                this.board[row1][col1] = this.board[row2][col2];
                this.board[row2][col2] = temp;
                this.renderBoard();
            }

            async processMatches() {
                this.isProcessing = true;
                let hasMatches = true;
                
                while (hasMatches) {
                    hasMatches = false;
                    const matches = this.findMatches();
                    
                    if (matches.length > 0) {
                        hasMatches = true;
                        
                        // 创建特殊炸弹
                        this.createSpecialBombs(matches);
                        
                        // 添加爆炸特效
                        this.addExplosionEffects(matches);
                        
                        // 等待爆炸动画
                        await this.sleep(300);
                        
                        // 消除匹配的方块
                        this.removeMatches(matches);
                        this.score += matches.length * 10;
                        
                        // 掉落新方块
                        this.dropNewBlocks();
                        this.renderBoard();
                        
                        // 等待掉落动画
                        await this.sleep(300);
                    }
                }
                
                this.isProcessing = false;
                this.checkGameEnd();
            }

            findMatches() {
                const matches = new Set();
                
                // 查找横向匹配
                for (let row = 0; row < 8; row++) {
                    let count = 1;
                    let current = this.board[row][0];
                    
                    for (let col = 1; col < 8; col++) {
                        if (this.board[row][col] === current && current !== null) {
                            count++;
                        } else {
                            if (count >= 3 && current !== null) {
                                for (let c = col - count; c < col; c++) {
                                    matches.add(`${row},${c}`);
                                }
                            }
                            count = 1;
                            current = this.board[row][col];
                        }
                    }
                    
                    if (count >= 3 && current !== null) {
                        for (let c = 8 - count; c < 8; c++) {
                            matches.add(`${row},${c}`);
                        }
                    }
                }
                
                // 查找纵向匹配
                for (let col = 0; col < 8; col++) {
                    let count = 1;
                    let current = this.board[0][col];
                    
                    for (let row = 1; row < 8; row++) {
                        if (this.board[row][col] === current && current !== null) {
                            count++;
                        } else {
                            if (count >= 3 && current !== null) {
                                for (let r = row - count; r < row; r++) {
                                    matches.add(`${r},${col}`);
                                }
                            }
                            count = 1;
                            current = this.board[row][col];
                        }
                    }
                    
                    if (count >= 3 && current !== null) {
                        for (let r = 8 - count; r < 8; r++) {
                            matches.add(`${r},${col}`);
                        }
                    }
                }
                
                return Array.from(matches).map(pos => {
                    const [row, col] = pos.split(',').map(Number);
                    return { row, col };
                });
            }

            createSpecialBombs(matches) {
                // 分析匹配模式创建特殊炸弹
                const matchGroups = this.groupMatches(matches);
                
                matchGroups.forEach(group => {
                    if (group.length >= 5) {
                        // 五连消：彩虹炸弹
                        const centerPos = group[Math.floor(group.length / 2)];
                        this.board[centerPos.row][centerPos.col] = '🌈';
                    } else if (group.length === 4) {
                        // 四连消：直线炸弹
                        const centerPos = group[Math.floor(group.length / 2)];
                        this.board[centerPos.row][centerPos.col] = '⚡';
                    } else if (this.isLShape(group)) {
                        // L形或T形：十字炸弹
                        const centerPos = this.findLShapeCenter(group);
                        this.board[centerPos.row][centerPos.col] = '💣';
                    }
                });
            }

            groupMatches(matches) {
                // 将匹配按连续性分组
                const visited = new Set();
                const groups = [];
                
                matches.forEach(match => {
                    const key = `${match.row},${match.col}`;
                    if (!visited.has(key)) {
                        const group = [];
                        this.dfsGroup(match, matches, visited, group);
                        if (group.length >= 3) {
                            groups.push(group);
                        }
                    }
                });
                
                return groups;
            }

            dfsGroup(current, allMatches, visited, group) {
                const key = `${current.row},${current.col}`;
                if (visited.has(key)) return;
                
                visited.add(key);
                group.push(current);
                
                // 查找相邻的匹配
                allMatches.forEach(match => {
                    if (!visited.has(`${match.row},${match.col}`) && 
                        this.isAdjacent(current.row, current.col, match.row, match.col)) {
                        this.dfsGroup(match, allMatches, visited, group);
                    }
                });
            }

            isLShape(group) {
                if (group.length < 5) return false;
                // 简化的L形检测
                return group.length >= 5;
            }

            findLShapeCenter(group) {
                // 返回组中心位置
                return group[Math.floor(group.length / 2)];
            }

            addExplosionEffects(matches) {
                matches.forEach(match => {
                    const cell = document.querySelector(`[data-row="${match.row}"][data-col="${match.col}"]`);
                    if (cell) {
                        const explosion = document.createElement('div');
                        explosion.className = 'explosion';
                        cell.appendChild(explosion);
                        
                        setTimeout(() => {
                            if (explosion.parentNode) {
                                explosion.parentNode.removeChild(explosion);
                            }
                        }, 600);
                    }
                });
            }

            removeMatches(matches) {
                matches.forEach(match => {
                    this.board[match.row][match.col] = null;
                });
            }

            dropNewBlocks() {
                // 从底部往上处理每一列
                for (let col = 0; col < 8; col++) {
                    // 收集非空方块
                    const nonEmptyBlocks = [];
                    for (let row = 7; row >= 0; row--) {
                        if (this.board[row][col] !== null) {
                            nonEmptyBlocks.push(this.board[row][col]);
                        }
                    }
                    
                    // 填充列
                    for (let row = 7; row >= 0; row--) {
                        if (row >= 8 - nonEmptyBlocks.length) {
                            this.board[row][col] = nonEmptyBlocks[7 - row];
                        } else {
                            this.board[row][col] = this.getRandomAnimal();
                        }
                    }
                }
            }

            sleep(ms) {
                return new Promise(resolve => setTimeout(resolve, ms));
            }

            useShuffle() {
                if (this.shuffleCount <= 0 || this.isProcessing) return;
                
                this.shuffleCount--;
                
                // 重新排列棋盘
                for (let i = 0; i < 100; i++) {
                    const row1 = Math.floor(Math.random() * 8);
                    const col1 = Math.floor(Math.random() * 8);
                    const row2 = Math.floor(Math.random() * 8);
                    const col2 = Math.floor(Math.random() * 8);
                    
                    const temp = this.board[row1][col1];
                    this.board[row1][col1] = this.board[row2][col2];
                    this.board[row2][col2] = temp;
                }
                
                this.renderBoard();
                this.updateUI();
            }

            useBomb() {
                if (this.bombCount <= 0 || this.isProcessing) return;
                
                this.bombCount--;
                
                // 随机炸掉3x3区域
                const centerRow = Math.floor(Math.random() * 6) + 1;
                const centerCol = Math.floor(Math.random() * 6) + 1;
                
                const bombMatches = [];
                for (let r = centerRow - 1; r <= centerRow + 1; r++) {
                    for (let c = centerCol - 1; c <= centerCol + 1; c++) {
                        if (r >= 0 && r < 8 && c >= 0 && c < 8) {
                            bombMatches.push({ row: r, col: c });
                        }
                    }
                }
                
                this.addExplosionEffects(bombMatches);
                setTimeout(() => {
                    this.removeMatches(bombMatches);
                    this.score += bombMatches.length * 10;
                    this.dropNewBlocks();
                    this.renderBoard();
                    this.processMatches();
                    this.updateUI();
                }, 300);
            }

            checkGameEnd() {
                const progress = (this.score / this.target) * 100;
                document.getElementById('progress').style.width = Math.min(progress, 100) + '%';
                
                if (this.score >= this.target) {
                    // 通关
                    this.showModal('恭喜通关！', `第${this.level}关完成！得分：${this.score}`, true);
                } else if (this.moves <= 0) {
                    // 游戏失败
                    this.showModal('游戏失败', `步数用完了，再试一次吧！`, false);
                }
            }

            showModal(title, message, isWin) {
                document.getElementById('modalTitle').textContent = title;
                document.getElementById('modalMessage').textContent = message;
                
                const modal = document.getElementById('gameModal');
                const nextBtn = modal.querySelector('button');
                
                if (isWin && this.level < 2) {
                    nextBtn.style.display = 'inline-block';
                    nextBtn.textContent = '下一关';
                } else if (isWin && this.level >= 2) {
                    nextBtn.style.display = 'inline-block';
                    nextBtn.textContent = '重新挑战';
                } else {
                    nextBtn.style.display = 'inline-block';
                    nextBtn.textContent = '重新开始';
                }
                
                modal.style.display = 'block';
            }

            nextLevel() {
                if (this.level === 1) {
                    this.level = 2;
                    this.target = 5000; // 第二关目标更高
                    this.moves = 25;    // 步数更少
                    this.shuffleCount = 0; // 第二关无道具
                    this.bombCount = 0;
                } else {
                    // 重新挑战第二关
                    this.level = 2;
                    this.target = 5000;
                    this.moves = 25;
                    this.shuffleCount = 0;
                    this.bombCount = 0;
                }
                
                this.score = 0;
                this.initGame();
                document.getElementById('gameModal').style.display = 'none';
            }

            restartGame() {
                this.level = 1;
                this.score = 0;
                this.moves = 30;
                this.target = 1000;
                this.shuffleCount = 1;
                this.bombCount = 1;
                this.initGame();
                document.getElementById('gameModal').style.display = 'none';
            }

            updateUI() {
                document.getElementById('score').textContent = this.score;
                document.getElementById('target').textContent = this.target;
                document.getElementById('moves').textContent = this.moves;
                document.getElementById('levelTitle').textContent = `第${this.level}关`;
                document.getElementById('shuffleCount').textContent = this.shuffleCount;
                document.getElementById('bombCount').textContent = this.bombCount;
                
                // 更新进度条
                const progress = (this.score / this.target) * 100;
                document.getElementById('progress').style.width = Math.min(progress, 100) + '%';
                
                // 更新道具按钮状态
                document.getElementById('shuffleBtn').disabled = this.shuffleCount <= 0;
                document.getElementById('bombBtn').disabled = this.bombCount <= 0;
            }
        }

        // 全局函数
        let game;

        function initGame() {
            game = new CuteMatch3Game();
        }

        function nextLevel() {
            game.nextLevel();
        }

        function restartGame() {
            game.restartGame();
        }

        function useShuffle() {
            game.useShuffle();
        }

        function useBomb() {
            game.useBomb();
        }

        // 点击模态框外部关闭
        document.getElementById('gameModal').onclick = function(e) {
            if (e.target === this) {
                this.style.display = 'none';
            }
        }

        // 游戏初始化
        window.onload = function() {
            initGame();
        }
    </script>
</body>
</html>
