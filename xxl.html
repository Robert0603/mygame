<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>动物消消乐</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comic Sans MS', cursive, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
        }

        .game-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .game-title {
            color: #4a5568;
            font-size: 2em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .game-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .info-item {
            background: linear-gradient(45deg, #ff9a9e 0%, #fecfef 100%);
            padding: 10px 15px;
            border-radius: 15px;
            color: #4a5568;
            font-weight: bold;
            font-size: 1.1em;
            margin: 5px;
            min-width: 120px;
            text-align: center;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-gap: 3px;
            background: #4a5568;
            border-radius: 15px;
            padding: 10px;
            margin-bottom: 20px;
        }

        .cell {
            aspect-ratio: 1;
            background: white;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 1.8em;
            transition: all 0.3s ease;
            user-select: none;
            position: relative;
            overflow: hidden;
        }

        .cell:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .cell.selected {
            background: #ffd700;
            transform: scale(1.15);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
        }

        .cell.matched {
            animation: matchAnimation 0.6s ease-in-out;
        }

        @keyframes matchAnimation {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); background: #ff6b6b; }
            100% { transform: scale(0); opacity: 0; }
        }

        .cell.falling {
            animation: fallAnimation 0.5s ease-in-out;
        }

        @keyframes fallAnimation {
            0% { transform: translateY(-50px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
        }

        .btn-primary {
            background: linear-gradient(45deg, #667eea 0%, #764ba2 100%);
        }

        .btn-secondary {
            background: linear-gradient(45deg, #f093fb 0%, #f5576c 100%);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
        }

        .modal-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .modal-title {
            font-size: 2em;
            margin-bottom: 15px;
            color: #4a5568;
        }

        .modal-message {
            font-size: 1.2em;
            margin-bottom: 20px;
            color: #666;
        }

        .win-modal .modal-title {
            color: #48bb78;
        }

        .lose-modal .modal-title {
            color: #f56565;
        }

        .progress-bar {
            width: 100%;
            height: 20px;
            background: #e2e8f0;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(45deg, #48bb78 0%, #38a169 100%);
            transition: width 0.3s ease;
            border-radius: 10px;
        }

        @media (max-width: 600px) {
            .game-title {
                font-size: 1.5em;
            }
            
            .cell {
                font-size: 1.4em;
            }
            
            .info-item {
                font-size: 1em;
                padding: 8px 12px;
                min-width: 100px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <h1 class="game-title">🎮 动物消消乐</h1>
        </div>
        
        <div class="game-info">
            <div class="info-item">
                🏆 得分: <span id="score">0</span>
            </div>
            <div class="info-item">
                🎯 目标: <span id="target">1000</span>
            </div>
            <div class="info-item">
                💎 步数: <span id="moves">30</span>
            </div>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        
        <div class="game-board" id="gameBoard"></div>
        
        <div class="controls">
            <button class="btn btn-primary" onclick="newGame()">🆕 新游戏</button>
            <button class="btn btn-secondary" onclick="resetGame()">🔄 重置</button>
        </div>
    </div>

    <!-- 游戏结束模态框 -->
    <div class="modal" id="gameModal">
        <div class="modal-content">
            <h2 class="modal-title" id="modalTitle"></h2>
            <p class="modal-message" id="modalMessage"></p>
            <button class="btn btn-primary" onclick="closeModal()">继续游戏</button>
            <button class="btn btn-secondary" onclick="newGame(); closeModal();">开始新游戏</button>
        </div>
    </div>

    <script>
        // 游戏配置
        const BOARD_SIZE = 8;
        const ANIMALS = ['🐶', '🐱', '🐰', '🦊', '🐻', '🐼'];
        const INITIAL_MOVES = 30;
        const TARGET_SCORE = 1000;
        const POINTS_PER_MATCH = 10;

        // 游戏状态
        let board = [];
        let selectedCell = null;
        let score = 0;
        let moves = INITIAL_MOVES;
        let target = TARGET_SCORE;
        let isAnimating = false;

        // 初始化游戏
        function initGame() {
            score = 0;
            moves = INITIAL_MOVES;
            target = TARGET_SCORE;
            selectedCell = null;
            isAnimating = false;
            
            updateUI();
            createBoard();
            generateInitialBoard();
            renderBoard();
        }

        // 创建游戏板DOM
        function createBoard() {
            const gameBoard = document.getElementById('gameBoard');
            gameBoard.innerHTML = '';
            
            for (let i = 0; i < BOARD_SIZE * BOARD_SIZE; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.index = i;
                cell.addEventListener('click', handleCellClick);
                gameBoard.appendChild(cell);
            }
        }

        // 生成初始游戏板（确保没有初始匹配）
        function generateInitialBoard() {
            board = [];
            
            for (let row = 0; row < BOARD_SIZE; row++) {
                board[row] = [];
                for (let col = 0; col < BOARD_SIZE; col++) {
                    let animal;
                    do {
                        animal = ANIMALS[Math.floor(Math.random() * ANIMALS.length)];
                    } while (
                        (col >= 2 && board[row][col-1] === animal && board[row][col-2] === animal) ||
                        (row >= 2 && board[row-1] && board[row-1][col] === animal && board[row-2][col] === animal)
                    );
                    board[row][col] = animal;
                }
            }
        }

        // 渲染游戏板
        function renderBoard() {
            const cells = document.querySelectorAll('.cell');
            cells.forEach((cell, index) => {
                const row = Math.floor(index / BOARD_SIZE);
                const col = index % BOARD_SIZE;
                cell.textContent = board[row][col];
                cell.classList.remove('selected', 'matched', 'falling');
            });
        }

        // 处理格子点击
        function handleCellClick(event) {
            if (isAnimating || moves <= 0) return;

            const index = parseInt(event.target.dataset.index);
            const row = Math.floor(index / BOARD_SIZE);
            const col = index % BOARD_SIZE;

            if (!selectedCell) {
                // 选择第一个格子
                selectedCell = {row, col, element: event.target};
                event.target.classList.add('selected');
            } else {
                // 选择第二个格子
                if (selectedCell.row === row && selectedCell.col === col) {
                    // 取消选择
                    selectedCell.element.classList.remove('selected');
                    selectedCell = null;
                    return;
                }

                // 检查是否相邻
                const rowDiff = Math.abs(selectedCell.row - row);
                const colDiff = Math.abs(selectedCell.col - col);
                
                if ((rowDiff === 1 && colDiff === 0) || (rowDiff === 0 && colDiff === 1)) {
                    // 尝试交换
                    attemptSwap(selectedCell.row, selectedCell.col, row, col);
                }

                // 清除选择
                selectedCell.element.classList.remove('selected');
                selectedCell = null;
            }
        }

        // 尝试交换两个格子
        function attemptSwap(row1, col1, row2, col2) {
            // 临时交换
            const temp = board[row1][col1];
            board[row1][col1] = board[row2][col2];
            board[row2][col2] = temp;

            // 检查是否有匹配
            const matches1 = findMatches(row1, col1);
            const matches2 = findMatches(row2, col2);

            if (matches1.length > 0 || matches2.length > 0) {
                // 有效交换
                moves--;
                updateUI();
                renderBoard();
                setTimeout(() => processMatches(), 300);
            } else {
                // 无效交换，还原
                board[row1][col1] = board[row2][col2];
                board[row2][col2] = temp;
            }
        }

        // 查找匹配
        function findMatches(row, col) {
            const animal = board[row][col];
            const matches = new Set();
            matches.add(`${row},${col}`);

            // 检查水平匹配
            let left = col - 1;
            while (left >= 0 && board[row][left] === animal) {
                matches.add(`${row},${left}`);
                left--;
            }
            
            let right = col + 1;
            while (right < BOARD_SIZE && board[row][right] === animal) {
                matches.add(`${row},${right}`);
                right++;
            }

            // 如果水平匹配少于3个，清除水平匹配
            const horizontalMatches = Array.from(matches).filter(pos => {
                const [r, c] = pos.split(',').map(Number);
                return r === row;
            });
            
            if (horizontalMatches.length < 3) {
                horizontalMatches.forEach(pos => matches.delete(pos));
                matches.add(`${row},${col}`);
            }

            // 检查垂直匹配
            let up = row - 1;
            while (up >= 0 && board[up][col] === animal) {
                matches.add(`${up},${col}`);
                up--;
            }
            
            let down = row + 1;
            while (down < BOARD_SIZE && board[down][col] === animal) {
                matches.add(`${down},${col}`);
                down++;
            }

            // 如果垂直匹配少于3个，清除垂直匹配
            const verticalMatches = Array.from(matches).filter(pos => {
                const [r, c] = pos.split(',').map(Number);
                return c === col;
            });
            
            if (verticalMatches.length < 3) {
                verticalMatches.forEach(pos => matches.delete(pos));
            }

            // 移除起始点如果没有有效匹配
            if (matches.size === 1) {
                matches.clear();
            }

            return Array.from(matches);
        }

        // 查找所有匹配
        function findAllMatches() {
            const allMatches = new Set();
            
            for (let row = 0; row < BOARD_SIZE; row++) {
                for (let col = 0; col < BOARD_SIZE; col++) {
                    const matches = findMatches(row, col);
                    matches.forEach(match => allMatches.add(match));
                }
            }
            
            return Array.from(allMatches);
        }

        // 处理匹配
        function processMatches() {
            isAnimating = true;
            const matches = findAllMatches();
            
            if (matches.length === 0) {
                isAnimating = false;
                checkGameOver();
                return;
            }

            // 标记匹配的格子
            matches.forEach(match => {
                const [row, col] = match.split(',').map(Number);
                const index = row * BOARD_SIZE + col;
                const cell = document.querySelector(`[data-index="${index}"]`);
                cell.classList.add('matched');
            });

            // 更新分数
            score += matches.length * POINTS_PER_MATCH;
            updateUI();

            setTimeout(() => {
                // 清除匹配的格子
                matches.forEach(match => {
                    const [row, col] = match.split(',').map(Number);
                    board[row][col] = null;
                });

                dropBlocks();
                fillEmpty();
                renderBoard();

                setTimeout(() => {
                    isAnimating = false;
                    // 检查连锁反应
                    processMatches();
                }, 500);
            }, 600);
        }

        // 方块下落
        function dropBlocks() {
            for (let col = 0; col < BOARD_SIZE; col++) {
                const column = [];
                
                // 收集非空格子
                for (let row = BOARD_SIZE - 1; row >= 0; row--) {
                    if (board[row][col] !== null) {
                        column.push(board[row][col]);
                    }
                }
                
                // 重新填充列
                for (let row = BOARD_SIZE - 1; row >= 0; row--) {
                    if (column.length > 0) {
                        board[row][col] = column.shift();
                    } else {
                        board[row][col] = null;
                    }
                }
            }
        }

        // 填充空格
        function fillEmpty() {
            for (let row = 0; row < BOARD_SIZE; row++) {
                for (let col = 0; col < BOARD_SIZE; col++) {
                    if (board[row][col] === null) {
                        board[row][col] = ANIMALS[Math.floor(Math.random() * ANIMALS.length)];
                        
                        // 添加下落动画
                        const index = row * BOARD_SIZE + col;
                        const cell = document.querySelector(`[data-index="${index}"]`);
                        cell.classList.add('falling');
                    }
                }
            }
        }

        // 更新UI
        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('moves').textContent = moves;
            document.getElementById('target').textContent = target;
            
            const progress = Math.min(100, (score / target) * 100);
            document.getElementById('progressFill').style.width = progress + '%';
        }

        // 检查游戏结束
        function checkGameOver() {
            if (score >= target) {
                showModal('🎉 恭喜获胜！', `太棒了！你达到了目标分数 ${target}！`, 'win-modal');
            } else if (moves <= 0) {
                showModal('😢 游戏结束', `很遗憾，步数用完了！你的得分是 ${score}`, 'lose-modal');
            }
        }

        // 显示模态框
        function showModal(title, message, className = '') {
            const modal = document.getElementById('gameModal');
            const modalTitle = document.getElementById('modalTitle');
            const modalMessage = document.getElementById('modalMessage');
            const modalContent = modal.querySelector('.modal-content');
            
            modalTitle.textContent = title;
            modalMessage.textContent = message;
            modalContent.className = 'modal-content ' + className;
            modal.style.display = 'block';
        }

        // 关闭模态框
        function closeModal() {
            document.getElementById('gameModal').style.display = 'none';
        }

        // 新游戏
        function newGame() {
            initGame();
        }

        // 重置游戏
        function resetGame() {
            if (confirm('确定要重置当前游戏吗？')) {
                initGame();
            }
        }

        // 点击模态框外部关闭
        window.onclick = function(event) {
            const modal = document.getElementById('gameModal');
            if (event.target === modal) {
                closeModal();
            }
        }

        // 启动游戏
        initGame();
    </script>
</body>
</html>
